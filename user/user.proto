syntax = "proto3";

package user;
option go_package="./user";

message Request {
  string ping = 1;
}

message Response {
  string pong = 1;
}

message GetUserRequest {
  int64 id = 1;
}

message GetUserResponse {
  int64 id = 1;
  string username = 2;
  string email = 3;
}

service User {
  rpc Ping(Request) returns(Response);
  rpc GetUser(GetUserRequest) returns(GetUserResponse);
}
